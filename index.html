    <!-- Structured Data: App -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Satsoko",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Android, iOS",
        "description": "Buy bitcoin instantly with Kenyan Shillings via M-Pesa. Sats are sent directly to your Lightning wallet in seconds — no sign-up, no KYC, no middleman.",
        "url": "https://satsoko.com",
        "image": "https://satsoko.com/favicon_io/android-chrome-512x512.png",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "KES"
        },
        "author": {
          "@type": "Organization",
          "name": "Satsoko",
          "url": "https://satsoko.com"
        },
        "areaServed": {
          "@type": "Country",
          "name": "Kenya"
        }
      }
    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is Satsoko?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Satsoko is a service that lets you buy Bitcoin (in satoshis) instantly using KES via M-Pesa. We connect your M-Pesa payment directly to your Lightning wallet — no exchange account or sign-up needed."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need to create an account?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No account is needed. Just enter the amount, your Lightning address, and your M-Pesa number. That's it — no sign-up, no KYC for standard amounts."
            }
          },
          {
            "@type": "Question",
            "name": "How long does it take to receive my Bitcoin?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Usually under 2 minutes. Once you confirm the M-Pesa STK push, our system automatically sends your sats to the Lightning address you provided."
            }
          },
          {
            "@type": "Question",
            "name": "Is Satsoko safe to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. We never hold your Bitcoin — sats are sent directly to your wallet immediately after your payment clears. You remain in full control of your funds at all times."
            }
          },
          {
            "@type": "Question",
            "name": "What is the minimum amount I can buy?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The minimum purchase is KES 100. There's no strict upper limit, though very large orders may require additional verification."
            }
          }
        ]
      }
    </script>
